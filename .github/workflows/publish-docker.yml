name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g., 1.0.0)'
        required: true
        type: string

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/jvm-devcontainer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Extract version from tag ref (e.g., refs/tags/v1.0.0 -> 1.0.0)
            VERSION=${{ github.ref }}
            VERSION=${VERSION#refs/tags/}
            # Remove 'v' prefix if present
            VERSION=${VERSION#v}
          else
            VERSION=${{ github.event.inputs.tag }}
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_tag=${REGISTRY}/${IMAGE_NAME}:${VERSION}" >> $GITHUB_OUTPUT
          echo "latest_tag=${REGISTRY}/${IMAGE_NAME}:latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.version_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "✅ Docker image built and pushed successfully!"
          echo ""
          echo "📋 Image Details:"
          echo "  Registry: ${{ env.REGISTRY }}"
          echo "  Image: ${{ env.IMAGE_NAME }}"
          echo "  Version Tag: ${{ steps.meta.outputs.version_tag }}"
          echo "  Latest Tag: ${{ steps.meta.outputs.latest_tag }}"
          echo "  Platforms: linux/amd64, linux/arm64"
          echo ""
          echo "🐳 Pull commands:"
          echo "  docker pull ${{ steps.meta.outputs.version_tag }}"
          echo "  docker pull ${{ steps.meta.outputs.latest_tag }}"
